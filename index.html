<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SYS::ACCESS — Control Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #070b0f;
    --bg2: #0d1117;
    --bg3: #111820;
    --panel: #0a0f14;
    --border: #1a2a3a;
    --border-glow: #00ff9940;
    --accent: #00ff99;
    --accent2: #00c8ff;
    --accent3: #ff3366;
    --text: #c8e6c9;
    --text-dim: #4a6a5a;
    --text-bright: #e8fff0;
    --red: #ff3366;
    --yellow: #ffcc00;
    --mono: 'Share Tech Mono', monospace;
    --display: 'Orbitron', sans-serif;
    --body: 'Rajdhani', sans-serif;
  }
  [data-theme="light"] {
    --bg: #f0f4f8;
    --bg2: #e2e8f0;
    --bg3: #cbd5e0;
    --panel: #ffffff;
    --border: #b0c4d8;
    --border-glow: #00998840;
    --accent: #007755;
    --accent2: #0066cc;
    --accent3: #cc0033;
    --text: #1a3a2a;
    --text-dim: #6a8a7a;
    --text-bright: #0a1a10;
  }
  [data-theme="red"] {
    --accent: #ff3366;
    --accent2: #ff9900;
    --border-glow: #ff336640;
    --text: #ffd0d8;
    --text-dim: #6a3a4a;
    --text-bright: #ffe8f0;
  }
  [data-theme="blue"] {
    --accent: #00c8ff;
    --accent2: #7744ff;
    --border-glow: #00c8ff40;
    --text: #c8e8ff;
    --text-dim: #3a5a6a;
    --text-bright: #e8f8ff;
  }

  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--body);}

  /* SCANLINES */
  body::before{
    content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.15) 2px,rgba(0,0,0,.15) 4px);
  }

  /* NOISE */
  body::after{
    content:'';position:fixed;inset:0;z-index:9998;pointer-events:none;opacity:.03;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  /* ===== SCREENS ===== */
  .screen{display:none;height:100vh;overflow:hidden;}
  .screen.active{display:flex;}

  /* ===== LOGIN ===== */
  #loginScreen{
    align-items:center;justify-content:center;
    background: radial-gradient(ellipse at 50% 60%, #0a1f14 0%, var(--bg) 70%);
    flex-direction:column;
    gap:0;
  }
  .login-glitch{
    font-family:var(--display);font-size:clamp(2rem,6vw,4rem);
    font-weight:900;letter-spacing:.3em;color:var(--accent);
    text-shadow:0 0 20px var(--accent),0 0 60px var(--accent);
    animation:glitch 4s infinite;
    margin-bottom:8px;
  }
  .login-sub{
    font-family:var(--mono);font-size:.75rem;color:var(--text-dim);
    letter-spacing:.4em;margin-bottom:48px;
    animation:blink 1.5s step-end infinite;
  }
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
  @keyframes glitch{
    0%,95%{text-shadow:0 0 20px var(--accent),0 0 60px var(--accent);}
    96%{text-shadow:-4px 0 var(--accent2),4px 0 var(--accent3);}
    97%{text-shadow:4px 0 var(--accent2),-4px 0 var(--accent3);}
    98%{text-shadow:0 0 20px var(--accent),0 0 60px var(--accent);}
  }

  .login-box{
    background:var(--panel);border:1px solid var(--border);
    padding:40px;width:min(420px,90vw);
    box-shadow:0 0 40px var(--border-glow),inset 0 0 40px rgba(0,255,153,.02);
    position:relative;
  }
  .login-box::before{
    content:'';position:absolute;top:0;left:0;right:0;height:2px;
    background:linear-gradient(90deg,transparent,var(--accent),transparent);
  }
  .corner{position:absolute;width:12px;height:12px;border-color:var(--accent);border-style:solid;}
  .corner.tl{top:-1px;left:-1px;border-width:2px 0 0 2px;}
  .corner.tr{top:-1px;right:-1px;border-width:2px 2px 0 0;}
  .corner.bl{bottom:-1px;left:-1px;border-width:0 0 2px 2px;}
  .corner.br{bottom:-1px;right:-1px;border-width:0 2px 2px 0;}

  .field-label{font-family:var(--mono);font-size:.65rem;color:var(--text-dim);letter-spacing:.2em;margin-bottom:6px;}
  .field-input{
    width:100%;background:var(--bg);border:1px solid var(--border);
    color:var(--text-bright);font-family:var(--mono);font-size:.9rem;
    padding:12px 16px;outline:none;transition:border-color .2s,box-shadow .2s;
    margin-bottom:20px;
  }
  .field-input:focus{border-color:var(--accent);box-shadow:0 0 10px var(--border-glow);}
  .btn-primary{
    width:100%;background:transparent;border:1px solid var(--accent);
    color:var(--accent);font-family:var(--display);font-size:.75rem;
    letter-spacing:.3em;padding:14px;cursor:pointer;
    transition:all .2s;text-transform:uppercase;
  }
  .btn-primary:hover{background:var(--accent);color:var(--bg);box-shadow:0 0 20px var(--border-glow);}
  .login-err{font-family:var(--mono);font-size:.75rem;color:var(--red);margin-top:12px;min-height:20px;text-align:center;}
  .login-toggle{
    font-family:var(--mono);font-size:.7rem;color:var(--text-dim);
    margin-top:16px;text-align:center;cursor:pointer;
  }
  .login-toggle span{color:var(--accent2);cursor:pointer;text-decoration:underline;}

  /* ===== DASHBOARD ===== */
  #dashScreen{flex-direction:row;}

  /* SIDEBAR */
  .sidebar{
    width:220px;min-width:220px;background:var(--panel);
    border-right:1px solid var(--border);
    display:flex;flex-direction:column;
    padding:0;
    box-shadow:2px 0 20px rgba(0,255,153,.05);
    z-index:10;
  }
  .sidebar-logo{
    padding:24px 20px;border-bottom:1px solid var(--border);
    font-family:var(--display);font-size:.8rem;font-weight:700;
    color:var(--accent);letter-spacing:.3em;
    text-shadow:0 0 10px var(--accent);
  }
  .sidebar-logo span{display:block;font-family:var(--mono);font-size:.55rem;color:var(--text-dim);letter-spacing:.2em;margin-top:4px;}
  .nav-item{
    display:flex;align-items:center;gap:12px;
    padding:14px 20px;cursor:pointer;
    border-left:2px solid transparent;
    font-family:var(--mono);font-size:.78rem;color:var(--text-dim);
    letter-spacing:.1em;transition:all .15s;
    text-transform:uppercase;
  }
  .nav-item:hover{color:var(--text);background:rgba(255,255,255,.03);}
  .nav-item.active{color:var(--accent);border-left-color:var(--accent);background:rgba(0,255,153,.05);}
  .nav-item .nav-icon{font-size:1rem;width:18px;text-align:center;}
  .nav-spacer{flex:1;}
  .sidebar-user{
    padding:16px 20px;border-top:1px solid var(--border);
    font-family:var(--mono);font-size:.7rem;color:var(--text-dim);
  }
  .sidebar-user strong{color:var(--accent);display:block;margin-bottom:2px;font-size:.8rem;}
  .status-dot{display:inline-block;width:6px;height:6px;background:var(--accent);border-radius:50%;margin-right:6px;box-shadow:0 0 6px var(--accent);animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  /* MAIN */
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  .topbar{
    background:var(--panel);border-bottom:1px solid var(--border);
    padding:0 28px;height:52px;display:flex;align-items:center;
    justify-content:space-between;
    font-family:var(--mono);font-size:.7rem;color:var(--text-dim);
    flex-shrink:0;
  }
  .topbar-path{color:var(--accent);}
  .topbar-right{display:flex;align-items:center;gap:20px;}
  .topbar-time{letter-spacing:.1em;}

  .page{display:none;flex:1;overflow-y:auto;padding:28px;flex-direction:column;}
  .page.active{display:flex;}

  /* Scrollbar */
  ::-webkit-scrollbar{width:4px;}
  ::-webkit-scrollbar-track{background:var(--bg);}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
  ::-webkit-scrollbar-thumb:hover{background:var(--accent);}

  /* ===== TERMINAL PAGE ===== */
  .term-header{
    font-family:var(--display);font-size:1.4rem;font-weight:700;
    color:var(--accent);letter-spacing:.2em;margin-bottom:24px;
  }
  .term-window{
    background:var(--bg);border:1px solid var(--border);
    flex:1;padding:20px;font-family:var(--mono);font-size:.82rem;
    color:var(--text);overflow-y:auto;
    box-shadow:inset 0 0 30px rgba(0,0,0,.4);
    min-height:300px;max-height:calc(100vh - 280px);
  }
  .term-line{padding:2px 0;line-height:1.6;}
  .term-line .prompt{color:var(--accent);}
  .term-line .cmd{color:var(--text-bright);}
  .term-line .out{color:var(--text-dim);}
  .term-line .err{color:var(--red);}
  .term-line .info{color:var(--accent2);}
  .term-input-row{
    display:flex;align-items:center;gap:8px;
    background:var(--bg);border:1px solid var(--border);
    border-top:none;padding:12px 20px;
  }
  .term-prompt-label{font-family:var(--mono);font-size:.82rem;color:var(--accent);white-space:nowrap;}
  .term-input{
    flex:1;background:transparent;border:none;outline:none;
    font-family:var(--mono);font-size:.82rem;color:var(--text-bright);
  }
  .term-stats{
    display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
    gap:16px;margin-bottom:24px;
  }
  .stat-card{
    background:var(--panel);border:1px solid var(--border);padding:16px 20px;
    position:relative;overflow:hidden;
  }
  .stat-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);}
  .stat-card .s-label{font-family:var(--mono);font-size:.6rem;color:var(--text-dim);letter-spacing:.2em;text-transform:uppercase;}
  .stat-card .s-val{font-family:var(--display);font-size:1.6rem;font-weight:700;color:var(--accent);margin-top:4px;}

  /* ===== VICTIMS TABLE ===== */
  .page-header{
    display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;
  }
  .page-title{font-family:var(--display);font-size:1.2rem;font-weight:700;color:var(--accent);letter-spacing:.2em;}
  .search-bar{
    background:var(--bg);border:1px solid var(--border);
    color:var(--text-bright);font-family:var(--mono);font-size:.8rem;
    padding:8px 16px;outline:none;width:240px;
  }
  .search-bar:focus{border-color:var(--accent);}
  .sort-btns{display:flex;gap:8px;flex-wrap:wrap;}
  .sort-btn{
    background:transparent;border:1px solid var(--border);
    color:var(--text-dim);font-family:var(--mono);font-size:.65rem;
    padding:6px 12px;cursor:pointer;letter-spacing:.1em;transition:all .15s;
  }
  .sort-btn:hover,.sort-btn.active{border-color:var(--accent);color:var(--accent);}
  .table-wrap{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:.75rem;}
  thead tr{background:var(--bg);border-bottom:2px solid var(--accent);}
  th{padding:12px 14px;text-align:left;color:var(--accent);letter-spacing:.15em;font-weight:400;white-space:nowrap;}
  tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
  tbody tr:hover{background:rgba(0,255,153,.04);}
  td{padding:10px 14px;color:var(--text);white-space:nowrap;}
  td.td-email{color:var(--accent2);}
  td.td-pass{color:var(--yellow);font-family:var(--mono);}
  td.td-ip{color:var(--text-dim);}
  .btn-del{
    background:transparent;border:1px solid var(--red);
    color:var(--red);font-family:var(--mono);font-size:.65rem;
    padding:4px 10px;cursor:pointer;transition:all .15s;
  }
  .btn-del:hover{background:var(--red);color:#fff;}
  .no-data{text-align:center;color:var(--text-dim);padding:48px;font-family:var(--mono);}

  /* ===== MY ACCOUNT ===== */
  .acc-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;}
  @media(max-width:700px){.acc-grid{grid-template-columns:1fr;}}
  .acc-card{
    background:var(--panel);border:1px solid var(--border);padding:24px;
    position:relative;
  }
  .acc-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent2),transparent);}
  .acc-card-title{font-family:var(--display);font-size:.7rem;letter-spacing:.3em;color:var(--accent2);margin-bottom:20px;text-transform:uppercase;}
  .avatar-area{display:flex;align-items:center;gap:20px;margin-bottom:20px;}
  .avatar{
    width:72px;height:72px;border-radius:50%;border:2px solid var(--accent);
    background:var(--bg);display:flex;align-items:center;justify-content:center;
    font-size:2rem;overflow:hidden;cursor:pointer;position:relative;
    box-shadow:0 0 20px var(--border-glow);
  }
  .avatar img{width:100%;height:100%;object-fit:cover;}
  .avatar-info .uname{font-family:var(--display);font-size:.9rem;color:var(--accent);}
  .avatar-info .uemail{font-family:var(--mono);font-size:.7rem;color:var(--text-dim);margin-top:4px;}
  .form-row{margin-bottom:16px;}
  .form-label{font-family:var(--mono);font-size:.65rem;color:var(--text-dim);letter-spacing:.15em;margin-bottom:6px;}
  .form-input{
    width:100%;background:var(--bg);border:1px solid var(--border);
    color:var(--text-bright);font-family:var(--mono);font-size:.82rem;
    padding:10px 14px;outline:none;transition:border-color .2s;
  }
  .form-input:focus{border-color:var(--accent);}
  .btn-sm{
    background:transparent;border:1px solid var(--accent);
    color:var(--accent);font-family:var(--mono);font-size:.7rem;
    padding:8px 16px;cursor:pointer;letter-spacing:.15em;transition:all .15s;
  }
  .btn-sm:hover{background:var(--accent);color:var(--bg);}
  .btn-sm.danger{border-color:var(--red);color:var(--red);}
  .btn-sm.danger:hover{background:var(--red);color:#fff;}
  .btn-sm.info{border-color:var(--accent2);color:var(--accent2);}
  .btn-sm.info:hover{background:var(--accent2);color:var(--bg);}
  .msg-ok{font-family:var(--mono);font-size:.72rem;color:var(--accent);margin-top:8px;}
  .msg-err{font-family:var(--mono);font-size:.72rem;color:var(--red);margin-top:8px;}

  /* ===== SETTINGS ===== */
  .settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;}
  @media(max-width:700px){.settings-grid{grid-template-columns:1fr;}}
  .set-card{background:var(--panel);border:1px solid var(--border);padding:24px;}
  .set-card-title{font-family:var(--display);font-size:.7rem;letter-spacing:.3em;color:var(--accent);margin-bottom:20px;text-transform:uppercase;}
  .theme-swatches{display:flex;gap:10px;flex-wrap:wrap;}
  .swatch{
    width:44px;height:44px;border:2px solid transparent;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);font-size:.55rem;letter-spacing:.05em;
    transition:all .15s;
  }
  .swatch.active{border-color:var(--accent);box-shadow:0 0 10px var(--border-glow);}
  .export-btns{display:flex;flex-direction:column;gap:10px;}
  .export-btn{
    display:flex;align-items:center;gap:12px;
    background:var(--bg);border:1px solid var(--border);
    color:var(--text);font-family:var(--mono);font-size:.78rem;
    padding:12px 16px;cursor:pointer;transition:all .15s;text-align:left;
  }
  .export-btn:hover{border-color:var(--accent);color:var(--accent);}
  .export-btn .ext{
    font-family:var(--display);font-size:.65rem;letter-spacing:.1em;
    color:var(--accent);border:1px solid var(--accent);padding:2px 6px;min-width:44px;text-align:center;
  }

  /* MODAL */
  .modal-overlay{
    display:none;position:fixed;inset:0;z-index:1000;
    background:rgba(0,0,0,.8);backdrop-filter:blur(4px);
    align-items:center;justify-content:center;
  }
  .modal-overlay.open{display:flex;}
  .modal{
    background:var(--panel);border:1px solid var(--border);
    padding:32px;width:min(420px,90vw);
    box-shadow:0 0 40px var(--border-glow);
    position:relative;
  }
  .modal::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent3),transparent);}
  .modal-title{font-family:var(--display);font-size:.9rem;letter-spacing:.2em;color:var(--accent3);margin-bottom:20px;}
  .modal-btns{display:flex;gap:12px;margin-top:20px;}

  /* TOAST */
  .toast{
    position:fixed;bottom:28px;right:28px;z-index:2000;
    background:var(--panel);border:1px solid var(--accent);
    color:var(--accent);font-family:var(--mono);font-size:.78rem;
    padding:12px 20px;box-shadow:0 0 20px var(--border-glow);
    transform:translateX(120%);transition:transform .3s;
    max-width:300px;
  }
  .toast.show{transform:translateX(0);}
  .toast.error{border-color:var(--red);color:var(--red);box-shadow:0 0 20px rgba(255,51,102,.3);}

  /* LOADING */
  #loadOverlay{
    position:fixed;inset:0;z-index:5000;
    background:var(--bg);display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:16px;
    transition:opacity .5s;
  }
  #loadOverlay.hidden{opacity:0;pointer-events:none;}
  .load-bar-wrap{width:200px;height:2px;background:var(--border);}
  .load-bar{height:100%;background:var(--accent);width:0;transition:width .3s;box-shadow:0 0 8px var(--accent);}
  .load-text{font-family:var(--mono);font-size:.7rem;color:var(--text-dim);letter-spacing:.2em;}

  /* firebase config notice */
  .cfg-notice{
    background:rgba(255,204,0,.08);border:1px solid var(--yellow);
    padding:12px 16px;font-family:var(--mono);font-size:.72rem;color:var(--yellow);
    margin-bottom:20px;
  }
  .cfg-notice a{color:var(--accent2);}

  /* ===== SITES PAGE ===== */

  .sites-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
  }

  .site-card{
    background:var(--panel);
    border:1px solid var(--border);
    overflow:hidden;
    position:relative;
    transition:.2s;
  }

  .site-card:hover{
    transform:translateY(-4px);
    border-color:var(--accent);
    box-shadow:0 0 20px var(--border-glow);
  }

  .site-preview{
    width:100%;
    height:180px;
    object-fit:cover;
    background:#111;
  }

  .site-content{
    padding:18px;
  }

  .site-title{
    font-family:var(--display);
    color:var(--accent);
    font-size:.9rem;
    letter-spacing:.15em;
    margin-bottom:10px;
  }

  .site-desc{
    font-family:var(--mono);
    color:var(--text-dim);
    font-size:.72rem;
    line-height:1.6;
    margin-bottom:14px;
  }

  .site-tags{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-bottom:16px;
  }

  .site-tag{
    border:1px solid var(--border);
    padding:4px 8px;
    font-size:.6rem;
    font-family:var(--mono);
    color:var(--accent2);
  }

  .site-btn{
    width:100%;
    background:transparent;
    border:1px solid var(--accent);
    color:var(--accent);
    padding:10px;
    cursor:pointer;
    font-family:var(--display);
    letter-spacing:.2em;
    transition:.2s;
  }

  .site-btn:hover{
    background:var(--accent);
    color:var(--bg);
  }

  /* ===== TUNNEL STATUS BAR ===== */
  .tunnel-status{
    background:var(--panel);
    border:1px solid var(--border);
    border-left:3px solid var(--accent);
    padding:14px 20px;
    margin-bottom:20px;
    display:flex;
    align-items:center;
    gap:20px;
    flex-wrap:wrap;
    font-family:var(--mono);
    font-size:.72rem;
  }
  .tunnel-info{
    display:flex;
    align-items:center;
    gap:8px;
  }
  .tunnel-label{
    color:var(--text-dim);
    letter-spacing:.1em;
  }
  .tunnel-timer{
    display:flex;
    align-items:center;
    gap:8px;
    margin-left:auto;
  }
  .timer-display{
    font-family:var(--display);
    font-size:1.2rem;
    color:var(--accent);
    letter-spacing:.15em;
    text-shadow:0 0 10px var(--border-glow);
    min-width:70px;
  }
</style>
</head>
