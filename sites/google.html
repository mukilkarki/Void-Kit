<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      color: #202124;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .box {
      background: #fff;
      padding: 40px 30px;
      border-radius: 8px;
      width: 360px;
      box-shadow: 0 1px 3px rgba(60,64,67,.15), 0 4px 8px rgba(60,64,67,.15);
      text-align: center;
    }
    input {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border: 1px solid #dadce0;
      border-radius: 4px;
      font-size: 16px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      background: #4285F4;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="box">
  <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png" alt="Google" style="margin-bottom:20px;">
  <h2 style="font-weight:400; margin-bottom:24px;">Sign in</h2>
  <form id="loginForm">
    <input type="text" name="username" id="username" placeholder="Username or Email" required>
    <input type="password" name="password" id="password" placeholder="Password" required>
    <button type="submit">Next</button>
  </form>
</div>

<script type="module" src="js/script.js">
</script>

</body>
</html>
